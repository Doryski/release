name: Publish

on:
  push:
    tags:
      # Semver only, so the moving `v1` consumer alias tag doesn't publish.
      - "v[0-9]*.[0-9]*.[0-9]*"

jobs:
  release:
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
      id-token: write
    with:
      run-lint: true
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
